name: lora_mdm
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults
dependencies:
  - python=3.10
  - pip
  # Core scientific stack
  - numpy>=1.24,<2.0      # <2.0 required for chumpy compatibility
  - scipy>=1.11
  - scikit-learn>=1.3
  - matplotlib>=3.7
  - pandas>=2.0
  # Data / IO
  - h5py>=3.9
  - pillow>=10.0
  - fftw>=3.3
  - gdown
  # NLP
  - spacy>=3.7
  # Utilities
  - tqdm
  - joblib
  - pyyaml
  - requests
  - filelock
  - packaging
  # 3D
  - trimesh>=4.0
  # Dev tools
  - ipython
  - jupyterlab>=4.0
  - ipywidgets
  - chumpy>=0.70
  - pip:
      # PyTorch — RTX 5060 (Blackwell) requires CUDA 13.0
      - torch --index-url https://download.pytorch.org/whl/cu130
      - torchvision --index-url https://download.pytorch.org/whl/cu130
      - torchaudio --index-url https://download.pytorch.org/whl/cu130
      - torchmetrics>=1.2
      # HuggingFace ecosystem
      - transformers>=4.40
      - diffusers>=0.27
      - accelerate>=0.28
      - huggingface-hub>=0.22
      - safetensors>=0.4
      - tokenizers>=0.19
      # Human body models
      - smplx>=0.1.28
      # chumpy: install manually after env creation — its setup.py uses `import pip`
      # which breaks on pip>=10. Run: pip install --no-build-isolation chumpy
      # Vision / multimodal
      - clip @ git+https://github.com/openai/CLIP.git
      - ftfy
      - regex
      # Video / image
      - "moviepy>=1.0.3,<2.0"  # v2 removed moviepy.editor and mplfig_to_npimage
      - imageio>=2.31
      - imageio-ffmpeg>=0.4
      # Experiment tracking
      - wandb>=0.18
      # Utilities
      - pydantic>=2.0
      - protobuf>=4.24
      - plotly>=5.18
      - blobfile>=2.0
      - beautifulsoup4
      - lxml
      - rich
      - typer
